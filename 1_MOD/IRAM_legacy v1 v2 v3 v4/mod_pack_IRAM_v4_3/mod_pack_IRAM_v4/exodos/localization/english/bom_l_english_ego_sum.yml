l_english:
 bom_ego_sum_mars:0 "Filius Martis — Path of War"
 bom_ego_sum_mars_desc:0 "The ruler declares himself a son of Mars — war is not his trade, it is his nature."
 bom_ego_sum_iovis:0 "Filius Iovis — Path of Piety"
 bom_ego_sum_iovis_desc:0 "The ruler declares himself a son of Jupiter — he burns with a faith no man can extinguish nor the gods contain."
 bom_ego_sum_mercurii:0 "Filius Mercurii — Path of Oratory"
 bom_ego_sum_mercurii_desc:0 "The ruler declares himself a son of Mercury — steel conquers lands, his words conquer men."
 bom_ego_sum_minervae:0 "Filius Minervae — Path of Wisdom"
 bom_ego_sum_minervae_desc:0 "The ruler declares himself a son of Minerva — he does not need to see the future, he builds it."
