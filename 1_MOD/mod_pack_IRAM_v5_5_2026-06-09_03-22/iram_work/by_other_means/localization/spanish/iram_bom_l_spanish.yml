l_spanish:
 iram_bom_confirm:0 "By Other Means: Eliminar Rivales"
 iram_bom_confirm_desc:0 "El estado tiene enemigos que no pueden ser derrotados en batalla abierta. Autoriza la eliminacion de todos los rivales del gobernante. Costo: 2000 oro, 500 soldados, 40 tirania. Esto no puede deshacerse."
 iram_bom_bacanal:0 "Bacanal"
 iram_bom_bacanal_desc:0 "El poder extiende una invitacion — vino, exceso, ruina. Quienes se nos oponen no caeran en batalla. Caeran en sus propias camaras, por sus propios apetitos. Costo: 500 oro, 10 tirania."
 iram_bom_kill_ruler:0 "Et tu, Brute?"
 iram_bom_kill_ruler_desc:0 "El gobernante debe caer. Autoriza su eliminacion y despeja el camino. Costo: 2000 oro, 500 soldados, 40 tirania."
 iram_bom_seize_holdings:0 "Iron Hand: Confiscar Propiedades"
 iram_bom_seize_holdings_desc:0 "La espada no siempre es necesaria. Despoja al rival del gobernante de todo lo que posee. La tierra es poder — Tomala. Costo: 2000 oro, 40 tirania."
 iram_bom_fill_the_void:0 "Iron Hand: Llenar el Vacio"
 iram_bom_fill_the_void_desc:0 "Mientras un rival amenaza, la tierra no puede quedarse sin dueno. Otorga todas las propiedades sin dueno al rival seleccionado, enriqueciendolo mas alla de sus ambiciones. Costo: 2000 oro, 40 tirania."

 # ── TOOLTIPS RD1 (T10) ─────────────────────────────────────────────────
 iram_tt_bom_rival:0               "Necesitás al menos 1 rival activo."
 iram_tt_bom_rival_unico:0         "Necesitás exactamente 1 rival activo empleado en tu corte."
 # ── HEREDERO DEL RIVAL ────────────────────────────────────────────
 iram_bom_heir_son:0 "Hijo del Rival"
 iram_bom_heir_son_desc:0 "Nacerá un hijo varón del rival del gobernante. El niño heredará la familia, religión y cultura del rival — y los rasgos dinásticos de ambos padres si los tienen. Su nombre será asignado según la cultura."
 iram_bom_heir_daughter:0 "Hija del Rival"
 iram_bom_heir_daughter_desc:0 "Nacerá una hija mujer del rival del gobernante. La niña heredará la familia, religión y cultura del rival — y los rasgos dinásticos de ambos padres si los tienen. Su nombre será asignado según la cultura."
