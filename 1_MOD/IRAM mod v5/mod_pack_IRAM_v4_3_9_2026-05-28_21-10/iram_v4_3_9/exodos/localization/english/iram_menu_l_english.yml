 iram_01_menu_open:0 "IRAM: Alternative Mechanics"
 iram_01_menu_open_desc:0 "Access the advanced state mechanics panel. Here you can control population movement, demographics, and political decisions of the empire."

 # ================================================================
 # NIVEL 1 — Categories
 # ================================================================
 iram_03_menu_management:0 "Population Movement"
 iram_03_menu_management_desc:0 "Concentrate, distribute, transfer, or optimize population between provinces and areas. Requires a rival in command as a position marker."

 iram_04_menu_behavior:0 "Demographics"
 iram_04_menu_behavior_desc:0 "Activate permanent decrees that accelerate pop migration, promotion, or demotion, and manage the relic of spiritual unity."

 iram_05_menu_political:0 "Political"
 iram_05_menu_political_desc:0 "Political decisions: eliminate rivals, manipulate characters, manage the rival heir, and structural reforms of the state."

 iram_06_cerrar_menu:0 "« Close menu"
 iram_06_cerrar_menu_desc:0 "Close the alternative mechanics panel."

