l_spanish:
 iram_36_ego_sum_mars:0 "Filius Martis — Camino de la Guerra"
 bom_ego_sum_mars_desc:0 "El gobernante se declara hijo de Marte — la guerra no es su oficio, es su naturaleza."
 iram_37_ego_sum_iovis:0 "Filius Iovis — Camino de la Piedad"
 bom_ego_sum_iovis_desc:0 "El gobernante se declara hijo de Jupiter — arde con una fe que ningun hombre puede apagar ni los dioses contener."
 iram_38_ego_sum_mercurii:0 "Filius Mercurii — Camino de la Oratoria"
 bom_ego_sum_mercurii_desc:0 "El gobernante se declara hijo de Mercurio — el acero conquista tierras, sus palabras conquistan hombres."
 iram_39_ego_sum_minervae:0 "Filius Minervae — Camino de la Sabiduria"
 bom_ego_sum_minervae_desc:0 "El gobernante se declara hijo de Minerva — no necesita ver el futuro, lo construye."
