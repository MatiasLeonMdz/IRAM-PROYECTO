 # ================================================================
 # NIVEL 0
 # ================================================================
 iram_01_menu_open:0 "IRAM: Mecánicas Alternativas"
 iram_01_menu_open_desc:0 "Acceder al panel de mecánicas avanzadas del estado. Aquí podés controlar el movimiento de población, la demografía y las decisiones políticas del imperio."

 # ================================================================
 # NIVEL 1 — Categorías
 # ================================================================
 iram_03_menu_management:0 "Movimiento de Pops"
 iram_03_menu_management_desc:0 "Concentrar, distribuir, transferir u optimizar la población entre provincias y áreas. Requiere un rival en comando como marcador de posición."

 iram_04_menu_behavior:0 "Demografía"
 iram_04_menu_behavior_desc:0 "Activar decretos permanentes que aceleran la migración, el ascenso o el descenso de pops, y gestionar la reliquia de unidad espiritual."

 iram_05_menu_political:0 "Político"
 iram_05_menu_political_desc:0 "Decisiones de carácter político: eliminar rivales, manipular personajes, gestionar el heredero del rival, y reformas estructurales del estado."

 iram_06_cerrar_menu:0 "« Cerrar menú"
 iram_06_cerrar_menu_desc:0 "Cerrar el panel de mecánicas alternativas."

 # ================================================================
 # NIVEL 2 — Cierre de categorías
 # ================================================================
 iram_07_cerrar_management:0 "« Volver al menú"
 iram_07_cerrar_management_desc:0 "Cerrar la categoría de Movimiento de Pops y volver al menú principal."

 iram_14_cerrar_behavior:0 "« Volver al menú"
 iram_08_cerrar_demografia_desc:0 "Cerrar la categoría de Demografía y volver al menú principal."

 iram_19_cerrar_political:0 "« Volver al menú"
 iram_09_cerrar_politico_desc:0 "Cerrar la categoría Político y volver al menú principal."

 # ================================================================
 # SUBMENU HEREDERO DEL RIVAL
 # ================================================================
 iram_20_rival_heir_open:0 "Heredero del Rival"
 iram_10_rival_heir_open_desc:0 "Engendrar un heredero usando al rival como padre. El heredero nacerá con rasgos influenciados por el linaje del rival."

 iram_21_cerrar_rival_heir:0 "« Volver a Político"
 iram_11_cerrar_rival_heir_desc:0 "Cerrar el submenú de Heredero del Rival."

 # ================================================================
